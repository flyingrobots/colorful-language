name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Docs & whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check for trailing whitespace / conflict markers
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --all --locked

  package:
    name: Cargo package witness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/package-witness.sh

  ir-witness:
    name: IR cross-language round-trip witness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install -g typescript@5
      - run: bash scripts/ir-witness.sh
      - name: graft reference consumer coordinate test
        run: node consumers/graft-projection.test.mjs

  editors:
    name: Editor integrations (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
        working-directory: editors/vscode
      - run: npm run compile
        working-directory: editors/vscode
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path editors/zed/Cargo.toml --target wasm32-wasip1
