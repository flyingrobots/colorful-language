name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs:
    name: Docs & whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for trailing whitespace / conflict markers
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  # The Rust job (fmt, clippy, test) lands with the cargo workspace in
  # Goalpost 0 — see issue #1 — and becomes the merge gate then.
