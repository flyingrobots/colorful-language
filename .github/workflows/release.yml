name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check release profile
        run: bash scripts/release-profile-check.sh

      - name: Verify release metadata
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          workspace_version="$(
            awk '
              /^\[workspace.package\]$/ { in_package = 1; next }
              /^\[/ { in_package = 0 }
              in_package && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          if [ "$workspace_version" != "$version" ]; then
            echo "Workspace version $workspace_version does not match tag $version."
            exit 1
          fi
          grep -F "## [$version]" CHANGELOG.md
          test -f "docs/goalposts/${GITHUB_REF_NAME}/release.md"
          test -f "docs/goalposts/${GITHUB_REF_NAME}/verification.md"

      - name: Verify the tag is on main
        run: |
          set -euo pipefail
          git fetch -q origin main
          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} is not an ancestor of origin/main; refusing to release."
            exit 1
          fi

      # Re-run the Rust build/test gate as a final guard. The full CI gate
      # (IR witness, editor compilation, Markdown, workflow lint) is not repeated
      # here: a tag must be an ancestor of `main` (verified above), where that
      # gate has already passed on the merged commit.
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --all --locked
      - run: cargo build --release --locked
      - run: bash scripts/package-witness.sh

      # Publish in dependency order. `cargo publish` waits for each crate to land
      # in the index before returning, so dependents resolve.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          crate_published() {
            curl --retry 3 --retry-delay 2 --fail --silent --show-error \
              "https://crates.io/api/v1/crates/$1/$version" >/dev/null
          }
          for crate in colorful-core colorful-lexicon colorful-parse colorful-ir colorful-lint colorful-cli colorful-lsp; do
            echo "::group::publish $crate"
            if crate_published "$crate"; then
              echo "$crate $version is already visible on crates.io; verifying and continuing."
              echo "::endgroup::"
              continue
            fi
            cargo publish -p "$crate" --locked
            for attempt in $(seq 1 30); do
              if crate_published "$crate"; then
                echo "$crate $version is visible on crates.io."
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "$crate $version did not become visible on crates.io in time."
                exit 1
              fi
              sleep 10
            done
            echo "::endgroup::"
          done

      - name: Package binaries
        run: |
          set -euo pipefail
          dist="colorful-language-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir -p "$dist"
          cp target/release/colorful target/release/colorful-lsp "$dist"/
          cp README.md LICENSE NOTICE CHANGELOG.md "$dist"/
          tar -czf "$dist.tar.gz" "$dist"
          sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="docs/goalposts/${GITHUB_REF_NAME}/release.md"
          if [ -f "$notes" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "colorful-language ${GITHUB_REF_NAME}" \
              --notes-file "$notes" \
              ./*.tar.gz ./*.sha256
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "colorful-language ${GITHUB_REF_NAME}" \
              --generate-notes \
              ./*.tar.gz ./*.sha256
          fi
